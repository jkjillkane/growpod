; GrowPod - Smart Microgreen Grow Chamber
; ESP32 Firmware - PlatformIO Configuration
;
; Flash Box 1:  pio run -e box1 --target upload
; Flash Box 2:  pio run -e box2 --target upload

; Shared settings for both boxes
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200

lib_deps =
    adafruit/DHT sensor library@^1.4.4
    adafruit/Adafruit Unified Sensor@^1.1.9
    adafruit/Adafruit AHTX0@^2.0.3
    https://github.com/sciosense/ENS160_driver.git
    bblanchon/ArduinoJson@^6.21.3
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/mobizt/Firebase-ESP-Client.git

board_build.partitions = huge_app.csv

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_LOOP_STACK_SIZE=16384
    -DDISABLE_BROWNOUT_DETECTOR

; ─── Box 1 ────────────────────────────────────
[env:box1]
build_flags =
    ${env.build_flags}
    '-DDEVICE_ID="growpod-001"'

; ─── Box 2 ────────────────────────────────────
[env:box2]
build_flags =
    ${env.build_flags}
    '-DDEVICE_ID="growpod-002"'
